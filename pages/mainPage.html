<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather App KPI</title>

<style>

body{
    margin:0;
    font-family: "Segoe UI", Tahoma, sans-serif;
    background:#e9ecef;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;
}

/* головний блок */
.container{
    background:white;
    border:1px solid #cfcfcf;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);

    width:90%;
    max-width:500px;

    padding:35px 40px;
}

/* заголовок */
h1{
    margin-top:0;
    text-align:center;

    font-size:28px;
    font-weight:600;

    color:#333;
}

/* підзаголовок */
.subtitle{
    text-align:center;
    color:#666;

    margin-bottom:30px;
}

/* список кнопок */
.buttons{
    display:flex;
    flex-direction:column;
    gap:12px;
}

/* кнопки */
.city-btn{

    padding:14px;

    background:#f5f5f5;
    border:1px solid #cfcfcf;

    font-size:16px;

    cursor:pointer;

    transition:0.15s;
}

/* hover */
.city-btn:hover{
    background:#e8e8e8;
}

/* active */
.city-btn:active{
    background:#dcdcdc;
}

/* адаптив */
@media (max-width:500px){

    .container{
        padding:25px;
    }

    h1{
        font-size:22px;
    }

}

</style>

<script src="script.js" defer></script>

</head>


<body>

<div class="container">

<h1>Weather App KPI</h1>

<p class="subtitle">
Select a city to view weather
</p>

<div class="buttons" id="buttons"></div>
</div>
</body>

</html>
